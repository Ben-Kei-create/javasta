name: iOS Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-14        # Xcode 15 / iOS 17 シミュレータ同梱
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode & available runtimes
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Select Simulator
        run: |
          set -euo pipefail

          # JSON で "available" かつ "iPhone" なデバイスを取得
          SIMULATOR_ID="$(
            xcrun simctl list devices available --json \
            | python3 -c "
import json, sys
data = json.load(sys.stdin)
for runtime, devices in data['devices'].items():
    if 'iOS' not in runtime:
        continue
    for d in devices:
        if d.get('isAvailable') and 'iPhone' in d['name']:
            print(d['udid'])
            sys.exit(0)
sys.exit(1)
"
          )"

          echo "SIMULATOR_ID=${SIMULATOR_ID}" >> "${GITHUB_ENV}"
          echo "Using simulator: ${SIMULATOR_ID}"
          xcrun simctl boot "${SIMULATOR_ID}" 2>/dev/null || true

      - name: Build
        run: |
          xcodebuild build \
            -project Javasta.xcodeproj \
            -scheme Javasta \
            -destination "platform=iOS Simulator,id=${SIMULATOR_ID}" \
            -quiet

      - name: Content Quality Tests
        run: |
          xcodebuild test \
            -project Javasta.xcodeproj \
            -scheme Javasta \
            -destination "platform=iOS Simulator,id=${SIMULATOR_ID}" \
            -only-testing:JavastaTests \
            -quiet

      - name: UI Smoke Tests
        run: |
          xcodebuild test \
            -project Javasta.xcodeproj \
            -scheme Javasta \
            -destination "platform=iOS Simulator,id=${SIMULATOR_ID}" \
            -only-testing:JavastaUITests \
            -quiet
